name: Verify bot and build Jeeb relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "android-jeeb-relay/**"
      - ".github/workflows/build-jeeb-relay.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "android-jeeb-relay/**"
      - ".github/workflows/build-jeeb-relay.yml"

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest pytest-asyncio
      - name: Compile and test
        run: |
          python -m compileall -q app tests migrations
          python -m pytest -q

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build installable debug APK
        run: gradle -p android-jeeb-relay --no-daemon assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: madhmoun-jeeb-relay-apk
          path: android-jeeb-relay/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
