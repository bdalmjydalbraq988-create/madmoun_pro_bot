name: Verify bot and build Jeeb relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "android-jeeb-relay/**"
      - ".github/workflows/build-jeeb-relay.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "android-jeeb-relay/**"
      - ".github/workflows/build-jeeb-relay.yml"

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest pytest-asyncio
      - name: Compile and test
        run: |
          python -m compileall -q app tests migrations
          python -m pytest -q

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build end-user release APK
        run: gradle -p android-jeeb-relay --no-daemon assembleRelease
      - name: Verify package, alignment, SDK and signatures
        shell: bash
        run: |
          set -euo pipefail
          APK="android-jeeb-relay/app/build/outputs/apk/release/app-release.apk"
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          "$BUILD_TOOLS/zipalign" -c -v 4 "$APK"
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK"
          "$BUILD_TOOLS/aapt" dump badging "$APK" | tee /tmp/apk-badging.txt
          grep -F "package: name='com.madhmoun.jeebrelay.universal' versionCode='4' versionName='1.0.3'" /tmp/apk-badging.txt
          grep -F "sdkVersion:'21'" /tmp/apk-badging.txt
          if grep -Fq "application-debuggable" /tmp/apk-badging.txt; then
            echo "Refusing to publish a debuggable APK" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: madhmoun-jeeb-relay-release-apk
          path: android-jeeb-relay/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
